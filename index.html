<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Library</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap"
        rel="stylesheet">
    <script src="js/script.js" defer></script>
</head>

<body>
    <nav class="navbar">
        <ul class="nav-list">
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <svg viewBox="0 -960 960 960" class="nav-icon">
                        <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z" />
                    </svg>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <span class="nav-title">The Modern Scholar</span>
                </a>
            </li>
            <li class="nav-item nav-right">
                <a href="" class="nav-link">
                    <svg viewBox="0 -960 960 960" class="nav-icon">
                        <path
                            d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z" />
                    </svg>
                </a>
            </li>
        </ul>
    </nav>
    <div class="container">
        <div class="default">
            <div class="default-hero-image">
                <div class="library-image-container">
                    <img src="assets/images/hero-library.jpg" class="library-image" alt="hero library image">
                </div>
                <div class="asymmetrical-detail">
                    <svg viewBox="0 -960 960 960" class="feather-icon">
                        <path
                            d="M320-160q-33 0-56.5-23.5T240-240v-120h120v-90q-35-2-66.5-15.5T236-506v-44h-46L60-680q36-46 89-65t107-19q27 0 52.5 4t51.5 15v-55h480v520q0 50-35 85t-85 35H320Zm120-200h240v80q0 17 11.5 28.5T720-240q17 0 28.5-11.5T760-280v-440H440v24l240 240v56h-56L510-514l-8 8q-14 14-29.5 25T440-464v104ZM224-630h92v86q12 8 25 11t27 3q23 0 41.5-7t36.5-25l8-8-56-56q-29-29-65-43.5T256-684q-20 0-38 3t-36 9l42 42Zm376 350H320v40h286q-3-9-4.5-19t-1.5-21Zm-280 40v-40 40Z" />
                    </svg>
                </div>
            </div>

            <div class="default-heading">
                <h2>Your Digital Archive<br>
                    is <span>Awaiting</span></h2>
            </div>

            <div class="default-description">
                <p>A blank page is the beginning of wisdom. Every great collection starts with a single, carefully
                    curated volume.</p>
            </div>

            <div class="default-add-button-container">
                <button class="default-add-button"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"
                        stroke="currentColor" class="add-box-icon">
                        <path
                            d="M450-290h60v-160h160v-60H510v-160h-60v160H290v60h160v160ZM212.31-140Q182-140 161-161q-21-21-21-51.31v-535.38Q140-778 161-799q21-21 51.31-21h535.38Q778-820 799-799q21 21 21 51.31v535.38Q820-182 799-161q-21 21-51.31 21H212.31Zm0-60h535.38q4.62 0 8.46-3.85 3.85-3.84 3.85-8.46v-535.38q0-4.62-3.85-8.46-3.84-3.85-8.46-3.85H212.31q-4.62 0-8.46 3.85-3.85 3.84-3.85 8.46v535.38q0 4.62 3.85 8.46 3.84 3.85 8.46 3.85ZM200-760v560-560Z" />
                    </svg>Add First Volume</button>
            </div>

            <div class="default-browse-button-container">
                <button class="default-browse-button"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"
                        stroke="currentColor" class="book-icon">
                        <path
                            d="M479.23-185.39q-48.38-35.69-104-55.15Q319.62-260 260-260q-36.61 0-71.92 8.11Q152.77-243.77 120-228q-21.38 9.84-40.69-2.93Q60-243.69 60-267.08v-433.53q0-12.93 6.85-23.89 6.84-10.96 19-15.96 40.61-19.77 84.65-29.65Q214.54-780 260-780q58.38 0 113.69 16.54Q429-746.92 480-716.92v459.38q50.62-32 106.81-47.23Q643-320 700-320q34.46 0 65.11 4.85 30.66 4.84 63.35 15.3 4.23 1.16 7.89.2 3.65-.97 3.65-6.35v-449.23q10.38 3.08 20.27 6.85 9.88 3.77 19.27 9.46 10.23 5 15.34 14.61 5.12 9.62 5.12 20.62v435.84q0 23.39-19.89 35.96-19.88 12.58-42.42 3.12-32.38-15.39-67.11-23.31Q735.85-260 700-260q-60 0-116.38 18.88-56.39 18.89-104.39 55.73ZM560-360v-360l200-200v380L560-360Zm-140 73.46v-394.07q-37.61-18.62-77.92-29.01Q301.77-720 260-720q-37 0-70.27 6.81-33.27 6.81-62.42 18.88-3.08 1.16-5.19 3.27-2.12 2.12-2.12 5.19v381.23q0 5.39 3.65 6.35 3.66.96 7.89-.58 29.61-10.69 61.04-15.92Q224-320 260-320q44.85 0 85.69 9.27 40.85 9.27 74.31 24.19Zm0 0v-394.07 394.07Z" />
                    </svg>Browse Curated Lists</button>
            </div>
        </div>
    </div>

    <dialog id="modal">
        <form method="dialog">
            <div class="modal-heading-container">
                <button class="form-close-btn" aria-label="Close"><svg xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 -960 960 960" class="close-icon">
                        <path
                            d="M256-213.85 213.85-256l224-224-224-224L256-746.15l224 224 224-224L746.15-704l-224 224 224 224L704-213.85l-224-224-224 224Z" />
                    </svg></button>
                <h2 class="modal-heading">new volume</h2>
                <p>add to private archive</p>
            </div>
            <ul class="modal-list">
                <li class="modal-input">
                    <label for="author">author / scholar</label>
                    <input type="text" id="author" name="author" placeholder="e.g. Umberto Eco">
                </li>
                <li class="modal-input">
                    <label for="title">title of work</label>
                    <input type="text" id="title" name="title" placeholder="The Name of the Rose">
                </li>
                <li class="modal-input">
                    <label for="pages">page count</label>
                    <input type="number" id="pages" name="pages" placeholder="512" min="1">
                </li>
                <li class="modal-input">
                    <label class="field-label">Read Status</label>
                    <label for="read-status" class="toggle-label">
                        <input type="checkbox" name="isRead" id="read-status" class="toggle-input">
                        <span class="toggle-track">
                            <span class="toggle-thumb"></span>
                        </span>
                        Finished Reading
                    </label>
                </li>
            </ul>
            <button class="form-button" type="submit">Save to Collection</button>
            <button class="form-cancel-button" type="button" id="form-cancel-button">Cancel</button>
        </form>
    </dialog>
    <button class="fab active"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" class="fab-icon">
            <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z" />
        </svg></button>
</body>

</html>
